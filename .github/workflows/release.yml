name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  checks:
    uses: ./.github/workflows/_ci.yml

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: checks
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
